# 生产环境专属配置（备用）
spring:
  # MySQL 连接URL（补上公钥允许参数，避免报错）
  datasource:
    url: jdbc:mysql://localhost:3306/hr_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
  # Hive 连接配置（生产环境，根据实际IP调整）
  hive:
    url: jdbc:hive2://localhost:10000/default
    username: hadoop
    password: ""
    driver-class-name: org.apache.hive.jdbc.HiveDriver

# 生产环境日志级别（INFO，减少日志量）
logging:
  level:
    com.hr.backend: INFO